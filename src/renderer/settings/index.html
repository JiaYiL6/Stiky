<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Stiky Settings</title>
</head>
<body>
  <div class="settings-container">
    <!-- 标题栏 -->
    <div class="titlebar">
      <div class="drag-region"></div>
      <span class="title">设置</span>
      <div class="titlebar-actions">
        <button class="tb-btn btn-close" id="btnClose" title="关闭">✕</button>
      </div>
    </div>

    <!-- 设置内容 -->
    <div class="settings-content" id="settingsContent">
      <!-- 便签默认值 -->
      <section class="settings-section">
        <h3>📝 便签默认值</h3>
        <div class="setting-row">
          <label>默认颜色</label>
          <div class="color-grid" id="defaultColorGrid"></div>
        </div>
        <div class="setting-row">
          <label>字体大小</label>
          <div class="slider-row">
            <input type="range" id="defaultFontSize" min="10" max="28" value="14" step="2">
            <span class="slider-val" id="defaultFontSizeVal">14px</span>
          </div>
        </div>
        <div class="setting-row">
          <label>默认透明度</label>
          <div class="slider-row">
            <input type="range" id="defaultOpacity" min="10" max="100" value="90" step="5">
            <span class="slider-val" id="defaultOpacityVal">90%</span>
          </div>
        </div>
        <div class="setting-row">
          <label>默认置顶</label>
          <label class="toggle-label">
            <input type="checkbox" id="defaultAlwaysOnTop">
            <span class="toggle-switch"></span>
          </label>
        </div>
        <div class="setting-row">
          <label>默认展开侧边栏</label>
          <label class="toggle-label">
            <input type="checkbox" id="defaultSidebarVisible" checked>
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>

      <!-- 文件中转站 -->
      <section class="settings-section">
        <h3>📁 文件中转站</h3>
        <div class="setting-row">
          <label>显示文件缩略图</label>
          <label class="toggle-label">
            <input type="checkbox" id="showThumbnails" checked>
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>

      <!-- 快捷键 -->
      <section class="settings-section">
        <h3>⌨️ 快捷键</h3>
        <div class="setting-row">
          <label>新建便签</label>
          <span class="hotkey-badge">Alt + N</span>
        </div>
        <div class="setting-row">
          <label>切换中转站</label>
          <span class="hotkey-badge">Alt + T</span>
        </div>
        <div class="setting-row">
          <label>打开便签管理器</label>
          <span class="hotkey-badge">Alt + M</span>
        </div>
      </section>

      <!-- 通用 -->
      <section class="settings-section">
        <h3>⚙️ 通用</h3>
        <div class="setting-row">
          <label>版本</label>
          <span class="version-text" id="versionText">v1.0.0</span>
          <button class="btn-sm" id="btnCheckUpdate">检查更新</button>
        </div>
        <div class="setting-row">
          <label>显示在任务栏</label>
          <label class="toggle-label">
            <input type="checkbox" id="showTaskbar" checked>
            <span class="toggle-switch"></span>
          </label>
        </div>
        <div class="setting-row">
          <label>开机启动</label>
          <label class="toggle-label">
            <input type="checkbox" id="launchOnStartup">
            <span class="toggle-switch"></span>
          </label>
        </div>
      </section>
    </div>
  </div>

  <script src="../shared/colors.js"></script>
  <script src="script.js"></script>
</body>
</html>
