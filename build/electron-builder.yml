appId: com.stiky.app
productName: Stiky
directories:
  output: dist
forceCodeSigning: false
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Stiky
  include: build/installer.nsh
extraResources:
  - from: src/assets/
    to: assets/
    filter:
      - "**/*"
