appId: com.stiky.app
productName: Stiky
directories:
  output: dist
forceCodeSigning: false
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: src/assets/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Stiky
extraResources:
  - from: src/assets/
    to: assets/
    filter:
      - "**/*"
